name: Contracts CI - Lint, Freshness, Parity, and Consumer Samples

on:
  pull_request:
  push:
    branches: [master]

jobs:
  contracts-lint-freshness-and-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21 (Microsoft)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"
          cache: gradle

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go Modules and Build Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('packages/go/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Cache Buf
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/buf
          key: ${{ runner.os }}-buf-${{ hashFiles('buf.yaml', 'buf.gen.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buf-

      - name: Lint Protobuf Contracts (Buf)
        run: buf lint

      - name: Validate Docs Freshness Markers
        run: ./scripts/check-docs.sh

      - name: Enforce Protobuf Breaking Compatibility Against Master
        run: |
          git fetch origin master:refs/remotes/origin/master
          buf breaking --against '.git#branch=origin/master'

      - name: Check Generated Output Freshness
        run: |
          buf generate
          git diff --exit-code -- packages/go packages/typescript/src/generated

      - name: Run JVM Fixture Parity Test
        run: ./gradlew --no-daemon clean test --tests sh.whoa.sutradhar.sdk.v1.ValidationParityTest

      - name: Run TypeScript Fixture Parity Test
        working-directory: packages/typescript
        run: node --test src/sdk/parity.test.mjs

      - name: Run TypeScript Upgrade Parity Test
        working-directory: packages/typescript
        run: node --test src/sdk/upgrade-parity.test.mjs

      - name: Run Go Fixture Parity Test
        working-directory: packages/go
        run: go test ./sh/whoa/sutradhar/sdk/v1

  consumer-samples-linux:
    name: Consumer Samples - Linux Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Java 21 (Microsoft)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"
          cache: gradle
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Setup Buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Run Suite Local
        run: make suite-local
