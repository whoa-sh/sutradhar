name: ci

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        run: buf lint

      - name: Generation freshness
        run: |
          buf generate
          git diff --exit-code -- packages/go packages/typescript/src/generated

      - name: JVM parity test
        run: ./gradlew --no-daemon clean test --tests sh.whoa.sutradhar.sdk.v1.ValidationParityTest

      - name: TypeScript parity test
        working-directory: packages/typescript
        run: node --test src/sdk/parity.test.mjs

      - name: Go parity test
        working-directory: packages/go
        run: go test ./sh/whoa/sutradhar/sdk/v1
