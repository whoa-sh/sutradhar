name: Release CI - Immutable Tag and Publish Preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in vX.Y.Z format"
        required: true
        type: string

jobs:
  release-preflight-verification:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Release Version Format (vX.Y.Z)
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Java 21 (Microsoft)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"
          cache: gradle

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Cache Go Modules and Build Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('packages/go/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Buf CLI
        uses: bufbuild/buf-setup-action@v1
      - name: Cache Buf
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/buf
          key: ${{ runner.os }}-buf-${{ hashFiles('buf.yaml', 'buf.gen.yaml') }}
          restore-keys: |
            ${{ runner.os }}-buf-

      - name: Run Full Local Verification Script
        run: ./scripts/verify.sh

      - name: Run Release Preflight Checks
        run: ./scripts/release-preflight.sh "${{ steps.version.outputs.version }}"

      - name: Validate Committed Cross-Ecosystem Versions
        run: ./scripts/validate-version.sh "${{ steps.version.outputs.version }}"

  publish-release-maven-and-npm:
    needs: release-preflight-verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Java 21 (Microsoft)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "21"
          cache: gradle
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
      - name: Publish Maven Release (GitHub Packages)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: ./gradlew --no-daemon publish
      - name: Publish NPM Release (GitHub Packages)
        working-directory: packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish --access restricted

  create-release-tag:
    needs:
      - release-preflight-verification
      - publish-release-maven-and-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Immutable Release Tag
        run: |
          VERSION="${{ needs.release-preflight-verification.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
