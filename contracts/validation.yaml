version: 1
owner: sh.whoa.sutradhar
error_model:
  fields:
    - code
    - message
    - path
    - severity
    - category
    - ruleId
    - expected
    - actual
    - constraint
    - documentationUrl
defaults:
  mode: collect_all
rules:
  - ruleId: HDR_REQUIRED_TENANT
    path: headers.tenantId
    severity: error
    description: tenantId header is mandatory.
  - ruleId: HDR_REQUIRED_TRACEPARENT
    path: headers.traceparent
    severity: error
    description: traceparent header is mandatory.
  - ruleId: HDR_REQUIRED_PRODUCER_SERVICE
    path: headers.producerService
    severity: error
    description: producerService header is mandatory.
  - ruleId: TCTX_REQUIRED_TENANT_ID
    path: common.tenant_context.tenant_id
    severity: error
    description: tenant_id must be present and non-blank.
  - ruleId: TRACE_REQUIRED_CORRELATION_ID
    path: common.trace_context.correlation_id
    severity: error
    description: correlation_id must be present and non-blank.
  - ruleId: TRACE_REQUIRED_CAUSATION_ID
    path: common.trace_context.causation_id
    severity: error
    description: causation_id must be present and non-blank.
  - ruleId: IDEMP_REQUIRED_SOURCE_SYSTEM
    path: common.idempotency_context.source_system
    severity: error
    description: source_system is mandatory for idempotency context.
  - ruleId: IDEMP_REQUIRED_SOURCE_EVENT_ID
    path: common.idempotency_context.source_event_id
    severity: error
    description: source_event_id is mandatory for idempotency context.
  - ruleId: IDEMP_REQUIRED_KEY
    path: common.idempotency_context.idempotency_key
    severity: error
    description: idempotency_key is mandatory and must not be blank.
  - ruleId: IDEMP_REQUIRED_SCOPE
    path: common.idempotency_context.dedupe_scope
    severity: error
    description: dedupe_scope must not be UNSPECIFIED.
  - ruleId: META_REQUIRED_KEY
    path: common.metadata.entries[].key
    severity: error
    description: metadata entry key must be present.
  - ruleId: META_REQUIRED_SENSITIVITY
    path: common.metadata.entries[].sensitivity
    severity: error
    description: metadata entry sensitivity must not be UNSPECIFIED.
  - ruleId: FAIL_REQUIRED_CODE_NAMESPACE
    path: common.failure_context.failure_code.namespace
    severity: error
    description: failure code namespace is mandatory.
  - ruleId: FAIL_REQUIRED_CODE
    path: common.failure_context.failure_code.code
    severity: error
    description: failure code is mandatory.
  - ruleId: FAIL_REQUIRED_SANITIZED_MESSAGE
    path: common.failure_context.failure_message
    severity: error
    description: failure_message must contain sanitized operator-safe text.
  - ruleId: NOTIF_REQUIRED_REQUEST_ID
    path: notification.request.request_id
    severity: error
    description: notification request_id is mandatory.
  - ruleId: NOTIF_REQUIRED_PRIORITY
    path: notification.request.priority
    severity: error
    description: notification priority must not be UNSPECIFIED.
  - ruleId: NOTIF_REQUIRED_CHANNEL
    path: notification.request.channel
    severity: error
    description: notification channel must not be UNSPECIFIED.
  - ruleId: NOTIF_REQUIRED_TARGET
    path: notification.request.target
    severity: error
    description: notification target is mandatory.
  - ruleId: NOTIF_REQUIRED_RECIPIENT_REF
    path: notification.request.recipient_ref
    severity: error
    description: recipient_ref is required for recipient-level requests.
  - ruleId: TARGET_REQUIRED_KIND
    path: notification.target.kind
    severity: error
    description: target kind must not be UNSPECIFIED.
  - ruleId: TARGET_REQUIRED_SENSITIVITY
    path: notification.target.sensitivity
    severity: error
    description: target sensitivity must not be UNSPECIFIED.
  - ruleId: TARGET_REQUIRED_ONEOF
    path: notification.target.target
    severity: error
    description: exactly one target variant must be set.
  - ruleId: LIFECYCLE_REQUIRED_EVENT_ID
    path: notification.lifecycle.event_id
    severity: error
    description: lifecycle event_id is mandatory.
  - ruleId: LIFECYCLE_REQUIRED_SEQUENCE
    path: notification.lifecycle.sequence_number
    severity: error
    description: lifecycle sequence_number must be positive.
  - ruleId: LIFECYCLE_REQUIRED_TYPE
    path: notification.lifecycle.type
    severity: error
    description: lifecycle type must not be UNSPECIFIED.
  - ruleId: LIFECYCLE_REQUIRED_ACTOR_TYPE
    path: notification.lifecycle.actor_type
    severity: error
    description: lifecycle actor_type must not be UNSPECIFIED.
  - ruleId: LIFECYCLE_DETAILS_MATCH_TYPE
    path: notification.lifecycle.details
    severity: error
    description: lifecycle details oneof must match lifecycle type.
  - ruleId: TEMPLATE_REF_REQUIRED_KEY
    path: template.ref.template_key
    severity: error
    description: template_key is mandatory.
  - ruleId: TEMPLATE_REF_REQUIRED_LOCALE
    path: template.ref.locale
    severity: error
    description: locale is mandatory and should be BCP-47.
  - ruleId: TEMPLATE_REF_REQUIRED_CHANNEL
    path: template.ref.channel
    severity: error
    description: template channel must not be UNSPECIFIED.
  - ruleId: TEMPLATE_REF_REQUIRED_VERSION_SELECTOR
    path: template.ref.version_selector
    severity: error
    description: version selector must be explicit (version or latest_active).
  - ruleId: TEMPLATE_LATEST_ACTIVE_REQUIRED_REASON
    path: template.ref.latest_active.reason
    severity: error
    description: latest_active reason is mandatory.
  - ruleId: RENDER_CMD_REQUIRED_REQUEST_ID
    path: template.render_command.request_id
    severity: error
    description: render command request_id is mandatory.
  - ruleId: RENDER_CMD_REQUIRED_RENDER_JOB_ID
    path: template.render_command.render_job_id
    severity: error
    description: render_job_id is mandatory.
  - ruleId: RENDER_CMD_REQUIRED_TEMPLATE_REF
    path: template.render_command.template_ref
    severity: error
    description: template_ref is mandatory in render command.
  - ruleId: RENDER_RESULT_REQUIRED_REQUEST_ID
    path: template.render_result.request_id
    severity: error
    description: render result request_id is mandatory.
  - ruleId: RENDER_RESULT_REQUIRED_RENDER_JOB_ID
    path: template.render_result.render_job_id
    severity: error
    description: render result render_job_id is mandatory.
  - ruleId: RENDER_RESULT_REQUIRED_STATUS
    path: template.render_result.status
    severity: error
    description: render status must not be UNSPECIFIED.
  - ruleId: RENDER_RESULT_REQUIRED_TEMPLATE_VERSION
    path: template.render_result.template_version_used
    severity: error
    description: template_version_used is mandatory in render result.
  - ruleId: RENDER_RESULT_REQUIRED_CHANNEL
    path: template.render_result.channel
    severity: error
    description: render result channel must not be UNSPECIFIED.
  - ruleId: PROVIDER_CMD_REQUIRED_REQUEST_ID
    path: provider.delivery_command.request_id
    severity: error
    description: provider delivery command request_id is mandatory.
  - ruleId: PROVIDER_CMD_REQUIRED_DELIVERY_TASK_ID
    path: provider.delivery_command.delivery_task_id
    severity: error
    description: delivery_task_id is mandatory in delivery command.
  - ruleId: PROVIDER_CMD_REQUIRED_ATTEMPT_ID
    path: provider.delivery_command.attempt_id
    severity: error
    description: attempt_id is mandatory in delivery command.
  - ruleId: PROVIDER_CMD_REQUIRED_CHANNEL
    path: provider.delivery_command.channel
    severity: error
    description: command channel must not be UNSPECIFIED.
  - ruleId: PROVIDER_CMD_REQUIRED_PRIORITY
    path: provider.delivery_command.priority
    severity: error
    description: command priority must not be UNSPECIFIED.
  - ruleId: PROVIDER_CMD_REQUIRED_TARGET
    path: provider.delivery_command.target
    severity: error
    description: command target is mandatory.
  - ruleId: PROVIDER_EVENT_REQUIRED_REQUEST_ID
    path: provider.delivery_event.request_id
    severity: error
    description: delivery event request_id is mandatory.
  - ruleId: PROVIDER_EVENT_REQUIRED_DELIVERY_TASK_ID
    path: provider.delivery_event.delivery_task_id
    severity: error
    description: delivery event delivery_task_id is mandatory.
  - ruleId: PROVIDER_EVENT_REQUIRED_ATTEMPT_ID
    path: provider.delivery_event.attempt_id
    severity: error
    description: delivery event attempt_id is mandatory.
  - ruleId: PROVIDER_EVENT_REQUIRED_CHANNEL
    path: provider.delivery_event.channel
    severity: error
    description: delivery event channel must not be UNSPECIFIED.
  - ruleId: PROVIDER_EVENT_REQUIRED_PROVIDER
    path: provider.delivery_event.provider
    severity: error
    description: provider type must not be UNSPECIFIED.
  - ruleId: PROVIDER_EVENT_REQUIRED_STATUS
    path: provider.delivery_event.status
    severity: error
    description: provider status must not be UNSPECIFIED.
  - ruleId: PROVIDER_EVENT_REQUIRED_OBSERVED_AT
    path: provider.delivery_event.observed_at
    severity: error
    description: observed_at is mandatory in delivery event.
