syntax = "proto3";

package sh.whoa.sutradhar.common.v1;

import "google/protobuf/timestamp.proto";
import "sh/whoa/sutradhar/common/v1/common_enums.proto";

option java_multiple_files = true;
option java_package = "sh.whoa.sutradhar.common.v1";
option go_package = "github.com/whoa-sh/sutradhar/packages/go/sh/whoa/sutradhar/common/v1;commonv1";

message Metadata {
  repeated MetadataEntry entries = 1;
}

message MetadataEntry {
  string key = 1;
  SensitivityClass sensitivity = 2;
  oneof value {
    string string_value = 3;
    int64 int_value = 4;
    bool bool_value = 5;
    string decimal_value = 6;
    google.protobuf.Timestamp timestamp_value = 7;
  }
}
