syntax = "proto3";

package sh.whoa.sutradhar.notification.v1;

option java_multiple_files = true;
option java_package = "sh.whoa.sutradhar.notification.v1";
option go_package = "github.com/whoa-sh/sutradhar/packages/go/sh/whoa/sutradhar/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";
import "sh/whoa/sutradhar/common/v1/failure_context.proto";
import "sh/whoa/sutradhar/common/v1/metadata.proto";
import "sh/whoa/sutradhar/common/v1/tenant_context.proto";
import "sh/whoa/sutradhar/common/v1/trace_context.proto";
import "sh/whoa/sutradhar/notification/v1/notification_enums.proto";

message AcceptedDetails {
  NotificationPriority priority = 1;
  NotificationChannel channel = 2;
}

message DuplicateDetails {
  string existing_request_id = 1;
}

message RejectedDetails {
  common.v1.FailureContext failure = 1;
}

message SuppressedDetails {
  string reason_code = 1;
  string reason_message = 2;
}

message RenderDetails {
  string render_job_id = 1;
}

message DeliveryDetails {
  string delivery_task_id = 1;
  string attempt_id = 2;
  NotificationChannel channel = 3;
  string provider = 4;
  string provider_sub_id = 5;
  string provider_message_id = 6;
}

message DlqDetails {
  string stage = 1;
  common.v1.FailureContext failure = 2;
}

message ReplayDetails {
  string original_event_id = 1;
  string replay_reason = 2;
}

message NotificationLifecycleEvent {
  common.v1.TenantContext tenant_context = 1;
  common.v1.TraceContext trace_context = 2;
  string request_id = 3;
  string event_id = 4;
  int64 sequence_number = 5;
  string causation_event_id = 6;
  LifecycleActorType actor_type = 7;
  string actor_id = 8;
  NotificationLifecycleEventType type = 9;
  google.protobuf.Timestamp occurred_at = 10;
  common.v1.Metadata metadata = 11;

  oneof details {
    AcceptedDetails accepted = 20;
    DuplicateDetails duplicate = 21;
    RejectedDetails rejected = 22;
    SuppressedDetails suppressed = 23;
    RenderDetails render = 24;
    DeliveryDetails delivery = 25;
    DlqDetails dlq = 26;
    ReplayDetails replay = 27;
  }
}
