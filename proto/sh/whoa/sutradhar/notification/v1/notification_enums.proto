syntax = "proto3";

package sh.whoa.sutradhar.notification.v1;

option java_multiple_files = true;
option java_package = "sh.whoa.sutradhar.notification.v1";
option go_package = "github.com/whoa-sh/sutradhar/packages/go/sh/whoa/sutradhar/notification/v1;notificationv1";

enum NotificationPriority {
  NOTIFICATION_PRIORITY_UNSPECIFIED = 0;
  NOTIFICATION_PRIORITY_CRITICAL = 1;
  NOTIFICATION_PRIORITY_HIGH = 2;
  NOTIFICATION_PRIORITY_NORMAL = 3;
  NOTIFICATION_PRIORITY_LOW = 4;
}

enum NotificationChannel {
  NOTIFICATION_CHANNEL_UNSPECIFIED = 0;
  NOTIFICATION_CHANNEL_EMAIL = 1;
  NOTIFICATION_CHANNEL_SMS = 2;
  NOTIFICATION_CHANNEL_PUSH = 3;
  NOTIFICATION_CHANNEL_WEBHOOK = 4;
}

enum PushPlatform {
  PUSH_PLATFORM_UNSPECIFIED = 0;
  PUSH_PLATFORM_IOS = 1;
  PUSH_PLATFORM_ANDROID = 2;
  PUSH_PLATFORM_WEB = 3;
}

enum NotificationLifecycleEventType {
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_ACCEPTED = 1;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_DUPLICATE = 2;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_REJECTED = 3;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_SUPPRESSED = 4;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_RENDER_REQUESTED = 5;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_RENDER_SUCCEEDED = 6;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_RENDER_FAILED = 7;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_DELIVERY_QUEUED = 8;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_DELIVERY_SENT = 9;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_DELIVERY_DELIVERED = 10;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_DELIVERY_FAILED = 11;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_CANCELLED = 12;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_DLQ = 13;
  NOTIFICATION_LIFECYCLE_EVENT_TYPE_REPLAYED = 14;
}

enum LifecycleActorType {
  LIFECYCLE_ACTOR_TYPE_UNSPECIFIED = 0;
  LIFECYCLE_ACTOR_TYPE_SYSTEM = 1;
  LIFECYCLE_ACTOR_TYPE_ADMIN_USER = 2;
  LIFECYCLE_ACTOR_TYPE_SCHEDULED_JOB = 3;
  LIFECYCLE_ACTOR_TYPE_REPLAY_WORKER = 4;
}

enum NotificationTargetKind {
  NOTIFICATION_TARGET_KIND_UNSPECIFIED = 0;
  NOTIFICATION_TARGET_KIND_EMAIL = 1;
  NOTIFICATION_TARGET_KIND_SMS = 2;
  NOTIFICATION_TARGET_KIND_PUSH = 3;
  NOTIFICATION_TARGET_KIND_WEBHOOK = 4;
}
