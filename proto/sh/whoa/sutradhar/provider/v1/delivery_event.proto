syntax = "proto3";

package sh.whoa.sutradhar.provider.v1;

import "google/protobuf/timestamp.proto";
import "sh/whoa/sutradhar/common/v1/failure_context.proto";
import "sh/whoa/sutradhar/common/v1/metadata.proto";
import "sh/whoa/sutradhar/notification/v1/notification_enums.proto";
import "sh/whoa/sutradhar/provider/v1/provider_enums.proto";

option java_multiple_files = true;
option java_package = "sh.whoa.sutradhar.provider.v1";
option go_package = "github.com/whoa-sh/sutradhar/packages/go/sh/whoa/sutradhar/provider/v1;providerv1";

message DeliveryEvent {
  string request_id = 1;
  string delivery_task_id = 2;
  string attempt_id = 3;
  notification.v1.NotificationChannel channel = 4;
  ProviderType provider = 5;
  string provider_sub_id = 6;
  string provider_message_id = 7;
  ProviderDeliveryStatus status = 8;
  string provider_native_status_code = 9;
  common.v1.FailureContext failure_context = 10;
  google.protobuf.Timestamp provider_event_time = 11;
  google.protobuf.Timestamp observed_at = 12;
  common.v1.Metadata metadata = 13;
}
